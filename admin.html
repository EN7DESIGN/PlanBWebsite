<!DOCTYPE html>
<html lang="fr-CD">
<head>
    <meta charset="utf-8" />
    <title>Admin — PlanB services</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous" />
    <script type="text/javascript">WebFont && WebFont.load({ google: { families: ["Bricolage Grotesque:300,400,500,600,700", "Manrope:300,400,500,600,700"] } });</script>

    <!-- Styles -->
    <link href="css/main.css" rel="stylesheet" type="text/css" />
    <link href="css/admin.css" rel="stylesheet" type="text/css" />

    <!-- Favicon -->
    <link href="images/Favicon_32.svg" rel="shortcut icon" type="image/x-icon" />

    <!-- Cloudinary Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <!-- Webfont loader -->
    <script src="js/webfont.js" type="text/javascript"></script>
    <script type="text/javascript">WebFont.load({ google: { families: ["Bricolage Grotesque:300,400,500,600,700", "Manrope:300,400,500,600,700"] } });</script>
</head>
<body class="body">

    <!-- Navbar -->
    <div class="admin-nav">
        <a href="/" class="admin-nav__logo">
            <img src="images/Logo.svg" alt="Logo PlanB services" />
        </a>
        <span class="admin-nav__badge">Admin</span>
    </div>

    <!-- Page -->
    <div class="admin-page">

        <!-- Header -->
        <div class="admin-header">
            <p class="admin-header__eyebrow">Espace administration</p>
            <h1 class="admin-header__title">Ajouter un <span class="accentprimary">projet</span></h1>
            <p class="admin-header__sub">Remplissez le formulaire ci-dessous pour publier un nouveau projet dans le portfolio.</p>
        </div>

        <!-- Form Card -->
        <form id="admin-form" class="admin-form">

            <!-- Token GitHub -->
            <div class="form-group">
                <label for="github-token">
                    <span class="form-label__icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M6.343 17.657A8 8 0 1 1 17.657 6.343"/><path d="M6.343 17.657 4.222 19.778M19.778 4.222l-2.121 2.121"/></svg>
                    </span>
                    Token GitHub
                    <span class="form-label__hint">Personal Access Token avec droit <code>repo</code></span>
                </label>
                <input type="password" id="github-token" required placeholder="github_pat_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
            </div>

            <!-- Service -->
            <div class="form-group">
                <label for="service-select">
                    <span class="form-label__icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    </span>
                    Service
                </label>
                <select id="service-select" required>
                    <option value="crea">PlanB Créa</option>
                    <option value="studio">PlanB Studio</option>
                    <option value="events">PlanB Events</option>
                    <option value="print">PlanB Print</option>
                </select>
            </div>

            <!-- Nom du projet -->
            <div class="form-group">
                <label for="project-name">
                    <span class="form-label__icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </span>
                    Nom du Projet
                </label>
                <input type="text" id="project-name" required placeholder="Ex : Campagne Été 2024" />
            </div>

            <!-- Médias -->
            <div class="form-group">
                <label>
                    <span class="form-label__icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                    </span>
                    Médias du Projet
                    <span class="form-label__hint">Images ou vidéos — hébergés sur Cloudinary</span>
                </label>
                <button type="button" id="upload-widget-btn" class="upload-widget-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Sélectionner des fichiers
                </button>
                <div id="media-preview" class="media-preview"></div>
                <p id="media-count" class="media-count"></p>
            </div>

            <!-- Submit -->
            <button type="submit" id="submit-btn" class="submit-btn" disabled>
                Publier le projet
            </button>

        </form>

        <!-- Status -->
        <div id="status-message"></div>

    </div>

    <script src="js/admin.js"></script>
</body>
</html>
